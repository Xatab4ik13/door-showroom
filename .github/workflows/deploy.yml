name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Build frontend
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Regenerate lockfile to avoid npm ci failures from Lovable edits
      - name: Install dependencies
        run: |
          rm -f package-lock.json
          npm install --package-lock-only
          npm ci

      - run: npm run build

      # Deploy backend code to VPS
      - name: Deploy backend via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/rusdoors
            git pull origin main

            # Rebuild backend + restart
            docker compose build backend
            docker compose up -d

            echo "✅ Backend deployed at $(date)"

      # Upload frontend build to VPS
      - name: Upload frontend build
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "dist/*"
          target: "/opt/rusdoors/frontend-dist"
          strip_components: 1

      # Restart nginx to serve new frontend
      - name: Restart nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/rusdoors
            docker compose restart nginx
            echo "✅ Frontend deployed at $(date)"
